name: ui
runtime: typescript
purpose: Web application for developers, AppSec teams, and platform administrators.
delivery_stage: phase6_dedicated_ui_active
responsibilities:
  - findings_exploration
  - remediation_workflows
  - scan_job_submission
  - approval_actions
  - reporting_and_exports
  - policy_and_risk_dashboarding
  - operations_notifications
primary_inputs:
  - control_plane_api
  - risk_engine_views
primary_outputs:
  - user_actions
  - workflow_updates
  - exported_reports
current_runtime_entry:
  path: ui/
  mount: / (via dedicated ui service) or embedded dist mount
fallback_runtime_entry:
  path: control-plane/internal/httpapi/static/
  mount: /app/
notes:
  - Dedicated TypeScript UI is now available under ui/
  - Embedded static UI remains for transitional fallback
  - Route visibility and write actions are now scoped by session permissions
  - Reports use server-backed summary and findings export endpoints
