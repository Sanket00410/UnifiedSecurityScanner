global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: control-plane
    metrics_path: /metrics
    static_configs:
      - targets:
          - control-plane-api:8080

  - job_name: platform-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - platform-services-api:18090

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://control-plane-api:8080/readyz
          - http://platform-services-api:18090/readyz
          - http://risk-engine-api:18110/healthz
          - http://ui:80/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
