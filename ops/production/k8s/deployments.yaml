            - configMapRef:
                name: uss-config
          ports:
            - containerPort: 18110
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18110
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18110
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
