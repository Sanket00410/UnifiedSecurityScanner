openapi: 3.1.0
info:
  title: Unified Security Scanner Control Plane API
  version: 1.0.0
  description: |
    Production control plane contract for job submission, worker coordination metadata,
    and finding retrieval.
servers:
  - url: http://localhost:8080
paths:
  /auth/oidc/start:
    get:
      operationId: startOidcSignIn
      responses:
        "307":
          description: Redirects the browser to the configured OIDC provider
        "503":
          description: OIDC is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/oidc/callback:
    get:
      operationId: finishOidcSignIn
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "307":
          description: Redirects the browser back to the application after establishing a session cookie
        "400":
          description: Invalid callback parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream OIDC exchange failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/logout:
    get:
      operationId: browserLogout
      responses:
        "307":
          description: Clears the browser session cookie and redirects to the app
    post:
      operationId: apiLogout
      responses:
        "204":
          description: Clears the browser session cookie
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
  /v1/meta:
    get:
      operationId: getMetadata
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Control plane metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceMetadata"
  /v1/auth/me:
    get:
      operationId: getAuthSession
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/auth/tokens:
    get:
      operationId: listApiTokens
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant API tokens
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiToken"
    post:
      operationId: createApiToken
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenRequest"
      responses:
        "201":
          description: API token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedApiToken"
        "400":
          description: Validation or scope error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/auth/tokens/{tokenId}/disable:
    post:
      operationId: disableApiToken
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API token disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiToken"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Protected token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/audit-events:
    get:
      operationId: listAuditEvents
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant audit events
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
  /v1/scan-jobs:
    get:
      operationId: listScanJobs
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Existing scan jobs
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanJob"
    post:
      operationId: createScanJob
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanJobRequest"
      responses:
        "201":
          description: Scan job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Policy denied the requested scan
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  policy_id:
                    type: string
                  rule_hits:
                    type: array
                    items:
                      type: string
  /v1/scan-jobs/{jobId}:
    get:
      operationId: getScanJob
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/scan-presets:
    get:
      operationId: listScanPresets
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Available scan presets
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanPreset"
  /v1/scan-targets:
    get:
      operationId: listScanTargets
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant scan targets
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanTarget"
    post:
      operationId: createScanTarget
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanTargetRequest"
      responses:
        "201":
          description: Scan target created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanTarget"
  /v1/scan-targets/{targetId}:
    get:
      operationId: getScanTarget
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan target details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanTarget"
        "404":
          description: Scan target not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateScanTarget
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScanTargetRequest"
      responses:
        "200":
          description: Scan target updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanTarget"
        "404":
          description: Scan target not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteScanTarget
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Scan target deleted
        "404":
          description: Scan target not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/scan-targets/{targetId}/run:
    post:
      operationId: runScanTarget
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: targetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunScanTargetRequest"
      responses:
        "201":
          description: Scan target run queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunScanTargetResponse"
        "403":
          description: Policy denied the requested run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Scan target not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/ingestion/sources:
    get:
      operationId: listIngestionSources
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant ingestion sources
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestionSource"
    post:
      operationId: createIngestionSource
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngestionSourceRequest"
      responses:
        "201":
          description: Ingestion source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedIngestionSource"
  /v1/ingestion/sources/{sourceId}:
    get:
      operationId: getIngestionSource
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ingestion source details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionSource"
        "404":
          description: Ingestion source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateIngestionSource
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIngestionSourceRequest"
      responses:
        "200":
          description: Ingestion source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionSource"
        "404":
          description: Ingestion source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteIngestionSource
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Ingestion source deleted
        "404":
          description: Ingestion source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/ingestion/sources/{sourceId}/rotate-token:
    post:
      operationId: rotateIngestionSourceToken
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ingestion source token rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateIngestionSourceTokenResponse"
        "404":
          description: Ingestion source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/ingestion/sources/{sourceId}/rotate-webhook-secret:
    post:
      operationId: rotateIngestionSourceWebhookSecret
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ingestion source webhook secret rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateIngestionSourceWebhookSecretResponse"
        "404":
          description: Ingestion source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/ingestion/events:
    get:
      operationId: listIngestionEvents
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: source_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Ingestion events
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestionEvent"
  /metrics:
    get:
      operationId: getOperationalMetricsPrometheus
      responses:
        "200":
          description: Prometheus operational metrics payload
          content:
            text/plain:
              schema:
                type: string
  /v1/events:
    get:
      operationId: listPlatformEvents
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: event_type
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
      responses:
        "200":
          description: Platform events for tenant and global stream
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformEvent"
  /v1/tenant/operations:
    get:
      operationId: getTenantOperationsSnapshot
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant operations usage and limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantOperationsSnapshot"
    put:
      operationId: updateTenantLimits
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantLimitsRequest"
      responses:
        "200":
          description: Updated tenant operations usage and limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantOperationsSnapshot"
        "400":
          description: Invalid tenant limit payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/tenant/execution-controls:
    get:
      operationId: getTenantExecutionControls
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant emergency-stop and maintenance-window controls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantExecutionControls"
    put:
      operationId: updateTenantExecutionControls
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantExecutionControlsRequest"
      responses:
        "200":
          description: Updated tenant execution controls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantExecutionControls"
        "400":
          description: Invalid execution controls payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/config:
    get:
      operationId: listTenantConfig
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: prefix
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Tenant configuration entries
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantConfigEntry"
  /v1/config/{key}:
    get:
      operationId: getTenantConfigEntry
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant configuration entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfigEntry"
        "404":
          description: Tenant configuration entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: upsertTenantConfigEntry
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTenantConfigRequest"
      responses:
        "200":
          description: Tenant configuration entry upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfigEntry"
        "400":
          description: Invalid tenant configuration payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteTenantConfigEntry
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Tenant configuration entry deleted
        "404":
          description: Tenant configuration entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/workload-identities/workers/issue:
    post:
      operationId: issueWorkerIdentityToken
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueWorkerIdentityRequest"
      responses:
        "201":
          description: Worker identity token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedWorkerIdentityToken"
        "400":
          description: Invalid worker identity issue payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Worker identity service is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/workload-identities/workers/certificates:
    get:
      operationId: listWorkloadCertificates
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: subject_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Issued workload certificates
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkloadCertificate"
    post:
      operationId: issueWorkerCertificate
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueWorkerCertificateRequest"
      responses:
        "201":
          description: Worker certificate issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedWorkerCertificate"
        "400":
          description: Invalid worker certificate issue payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Certificate authority is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/workload-identities/workers/certificates/{certificateId}/revoke:
    post:
      operationId: revokeWorkloadCertificate
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeWorkloadCertificateRequest"
      responses:
        "200":
          description: Workload certificate revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadCertificate"
        "404":
          description: Workload certificate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/trust/ca-bundle:
    get:
      operationId: getCertificateAuthorityBundle
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Active certificate authority bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateAuthorityBundle"
        "503":
          description: Certificate authority is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/kms/keys:
    get:
      operationId: listKmsKeys
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Tenant KMS keys
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/KMSKey"
    post:
      operationId: createKmsKey
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKMSKeyRequest"
      responses:
        "201":
          description: KMS key metadata created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KMSKey"
        "400":
          description: Invalid KMS key request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/kms/encrypt:
    post:
      operationId: encryptWithKms
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KMSEncryptRequest"
      responses:
