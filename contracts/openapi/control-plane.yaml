components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: API Token
    SessionCookie:
      type: apiKey
      in: cookie
      name: uss_session
  schemas:
    AuthPrincipal:
      type: object
      additionalProperties: false
      required:
        - user_id
        - organization_id
        - organization_slug
        - organization_name
        - email
        - display_name
        - role
        - auth_provider
      properties:
        user_id:
          type: string
        organization_id:
          type: string
        organization_slug:
          type: string
        organization_name:
          type: string
        email:
          type: string
        display_name:
          type: string
        role:
          type: string
        auth_provider:
          type: string
        scopes:
          type: array
          items:
            type: string
    AuthSession:
      type: object
      additionalProperties: false
      required:
        - principal
        - sso_enabled
        - bootstrap_token
      properties:
        principal:
          $ref: "#/components/schemas/AuthPrincipal"
        sso_enabled:
          type: boolean
        oidc_issuer_url:
          type: string
        oidc_client_id:
          type: string
        bootstrap_token:
          type: boolean
    ApiToken:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - user_id
        - token_name
        - disabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        user_id:
          type: string
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        disabled:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateApiTokenRequest:
      type: object
      additionalProperties: false
      required:
        - token_name
      properties:
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
    CreatedApiToken:
      type: object
      additionalProperties: false
      required:
        - token
        - plaintext_token
      properties:
        token:
          $ref: "#/components/schemas/ApiToken"
        plaintext_token:
          type: string
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - action
        - resource_type
        - status
        - created_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        actor_user_id:
          type: string
        actor_email:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        status:
          type: string
        request_method:
          type: string
        request_path:
          type: string
        remote_addr:
          type: string
        details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    CreateScanJobRequest:
      type: object
      additionalProperties: false
      required:
        - target_kind
        - target
        - profile
      properties:
        tenant_id:
          type: string
        target_kind:
          type: string
          enum:
            - repository
            - api
            - domain
            - image
            - cloud_account
        target:
          type: string
        profile:
