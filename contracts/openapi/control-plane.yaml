openapi: 3.1.0
info:
  title: Unified Security Scanner Control Plane API
  version: 1.0.0
  description: |
    Production control plane contract for job submission, worker coordination metadata,
    and finding retrieval.
servers:
  - url: http://localhost:8080
paths:
  /auth/oidc/start:
    get:
      operationId: startOidcSignIn
      responses:
        "307":
          description: Redirects the browser to the configured OIDC provider
        "503":
          description: OIDC is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/oidc/callback:
    get:
      operationId: finishOidcSignIn
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "307":
          description: Redirects the browser back to the application after establishing a session cookie
        "400":
          description: Invalid callback parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream OIDC exchange failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/logout:
    get:
      operationId: browserLogout
      responses:
        "307":
          description: Clears the browser session cookie and redirects to the app
    post:
      operationId: apiLogout
      responses:
        "204":
          description: Clears the browser session cookie
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
  /v1/meta:
    get:
      operationId: getMetadata
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Control plane metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceMetadata"
  /v1/auth/me:
    get:
      operationId: getAuthSession
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/auth/tokens:
    get:
      operationId: listApiTokens
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant API tokens
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiToken"
    post:
      operationId: createApiToken
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenRequest"
      responses:
        "201":
          description: API token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedApiToken"
        "400":
          description: Validation or scope error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/auth/tokens/{tokenId}/disable:
    post:
      operationId: disableApiToken
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API token disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiToken"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Protected token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/audit-events:
    get:
      operationId: listAuditEvents
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant audit events
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
  /v1/scan-jobs:
    get:
      operationId: listScanJobs
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Existing scan jobs
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanJob"
    post:
      operationId: createScanJob
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanJobRequest"
      responses:
        "201":
          description: Scan job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Policy denied the requested scan
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  policy_id:
                    type: string
                  rule_hits:
                    type: array
                    items:
                      type: string
  /v1/scan-jobs/{jobId}:
    get:
      operationId: getScanJob
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/workers/register:
    post:
      operationId: registerWorker
      parameters:
        - name: X-USS-Worker-Secret
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerRegistrationRequest"
      responses:
        "200":
          description: Worker registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerRegistrationResponse"
  /v1/workers/heartbeat:
    post:
      operationId: recordWorkerHeartbeat
      parameters:
        - name: X-USS-Worker-Secret
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: Worker heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
        "404":
          description: Worker lease not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/findings:
    get:
      operationId: listFindings
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Canonical findings
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CanonicalFinding"
  /v1/assets:
    get:
      operationId: listAssets
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant asset summaries
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssetSummary"
  /v1/policies:
    get:
      operationId: listPolicies
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant and global policies
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
    post:
      operationId: createPolicy
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/policies/{policyId}:
    get:
      operationId: getPolicy
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updatePolicy
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/policies/{policyId}/versions:
    get:
      operationId: listPolicyVersions
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy version history
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyVersion"
  /v1/policies/{policyId}/rollback:
    post:
      operationId: rollbackPolicy
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyRollbackRequest"
      responses:
        "200":
          description: Policy rolled back to a historical version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Policy or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/policy-approvals:
    get:
      operationId: listPolicyApprovals
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Pending and historical policy approvals
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyApproval"
  /v1/policy-approvals/{approvalId}/approve:
    post:
      operationId: approvePolicyApproval
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: approvalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyApprovalDecisionRequest"
      responses:
        "200":
          description: Approval granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyApproval"
  /v1/policy-approvals/{approvalId}/deny:
    post:
      operationId: denyPolicyApproval
      security:
        - BearerToken: []
        - SessionCookie: []
      parameters:
        - name: approvalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyApprovalDecisionRequest"
      responses:
        "200":
          description: Approval denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyApproval"
  /v1/remediations:
    get:
      operationId: listRemediations
      security:
        - BearerToken: []
        - SessionCookie: []
      responses:
        "200":
          description: Tenant remediation actions
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RemediationAction"
    post:
      operationId: createRemediation
      security:
        - BearerToken: []
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRemediationRequest"
      responses:
        "201":
          description: Remediation action created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediationAction"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: API Token
    SessionCookie:
      type: apiKey
      in: cookie
      name: uss_session
  schemas:
    AuthPrincipal:
      type: object
      additionalProperties: false
      required:
        - user_id
        - organization_id
        - organization_slug
        - organization_name
        - email
        - display_name
        - role
        - auth_provider
      properties:
        user_id:
          type: string
        organization_id:
          type: string
        organization_slug:
          type: string
        organization_name:
          type: string
        email:
          type: string
        display_name:
          type: string
        role:
          type: string
        auth_provider:
          type: string
        scopes:
          type: array
          items:
            type: string
    AuthSession:
      type: object
      additionalProperties: false
      required:
        - principal
        - sso_enabled
        - bootstrap_token
      properties:
        principal:
          $ref: "#/components/schemas/AuthPrincipal"
        sso_enabled:
          type: boolean
        oidc_issuer_url:
          type: string
        oidc_client_id:
          type: string
        bootstrap_token:
          type: boolean
    ApiToken:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - user_id
        - token_name
        - disabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        user_id:
          type: string
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        disabled:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateApiTokenRequest:
      type: object
      additionalProperties: false
      required:
        - token_name
      properties:
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
    CreatedApiToken:
      type: object
      additionalProperties: false
      required:
        - token
        - plaintext_token
      properties:
        token:
          $ref: "#/components/schemas/ApiToken"
        plaintext_token:
          type: string
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - action
        - resource_type
        - status
        - created_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        actor_user_id:
          type: string
        actor_email:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        status:
          type: string
        request_method:
          type: string
        request_path:
          type: string
        remote_addr:
          type: string
        details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    CreateScanJobRequest:
      type: object
      additionalProperties: false
      required:
        - target_kind
        - target
        - profile
      properties:
        tenant_id:
          type: string
        target_kind:
          type: string
          enum:
            - repository
            - api
            - domain
            - image
            - cloud_account
        target:
          type: string
        profile:
          type: string
        requested_by:
          type: string
        tools:
          type: array
          items:
            type: string
    ScanJob:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - target_kind
        - target
        - profile
        - requested_by
        - tools
        - approval_mode
        - status
        - requested_at
        - updated_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        target_kind:
          type: string
        target:
          type: string
        profile:
          type: string
        requested_by:
          type: string
        tools:
          type: array
          items:
            type: string
        approval_mode:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
        requested_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ServiceMetadata:
      type: object
      additionalProperties: false
      required:
        - name
        - version
        - scheduler_interval_seconds
        - worker_heartbeat_ttl_seconds
      properties:
        name:
          type: string
        version:
          type: string
        scheduler_interval_seconds:
          type: integer
        worker_heartbeat_ttl_seconds:
          type: integer
    AssetSummary:
      type: object
      additionalProperties: false
      required:
        - asset_id
        - asset_type
        - last_scanned_at
        - scan_count
        - finding_count
      properties:
        asset_id:
          type: string
        asset_type:
          type: string
        last_scanned_at:
          type: string
          format: date-time
        scan_count:
          type: integer
        finding_count:
          type: integer
    Policy:
      type: object
      additionalProperties: false
      required:
        - id
        - version_number
        - name
        - scope
        - mode
        - enabled
        - rules
        - updated_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        version_number:
          type: integer
        name:
          type: string
        scope:
          type: string
        mode:
          type: string
        enabled:
          type: boolean
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreatePolicyRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
        scope:
          type: string
        mode:
          type: string
        enabled:
          type: boolean
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        updated_by:
          type: string
        global:
          type: boolean
    UpdatePolicyRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
        scope:
          type: string
        mode:
          type: string
        enabled:
          type: boolean
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
        updated_by:
          type: string
    PolicyRule:
      type: object
      additionalProperties: false
      required:
        - effect
        - field
        - match
        - values
      properties:
        effect:
          type: string
          enum:
            - allow
            - block
            - require_approval
            - monitor
        field:
          type: string
          enum:
            - tool
            - target
            - target_kind
            - profile
        match:
          type: string
          enum:
            - exact
            - prefix
            - suffix
            - contains
            - any
        values:
          type: array
          items:
            type: string
        exceptions:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRuleException"
    PolicyRuleException:
      type: object
      additionalProperties: false
      required:
        - match
        - values
      properties:
        field:
          type: string
          enum:
            - tool
            - target
            - target_kind
            - profile
        match:
          type: string
          enum:
            - exact
            - prefix
            - suffix
            - contains
            - any
        values:
          type: array
          items:
            type: string
    PolicyVersion:
      type: object
      additionalProperties: false
      required:
        - id
        - policy_id
        - version_number
        - change_type
        - snapshot
        - created_by
        - created_at
      properties:
        id:
          type: string
        policy_id:
          type: string
        version_number:
          type: integer
        change_type:
          type: string
        snapshot:
          $ref: "#/components/schemas/Policy"
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
    PolicyRollbackRequest:
      type: object
      additionalProperties: false
      required:
        - version_number
      properties:
        version_number:
          type: integer
    PolicyApproval:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - scan_job_id
        - task_id
        - action
        - status
        - requested_by
        - created_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        scan_job_id:
          type: string
        task_id:
          type: string
        policy_id:
          type: string
        action:
          type: string
        status:
          type: string
        requested_by:
          type: string
        decided_by:
          type: string
        reason:
          type: string
        created_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
          nullable: true
    PolicyApprovalDecisionRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
    RemediationAction:
      type: object
      additionalProperties: false
      required:
        - id
        - finding_id
        - title
        - status
        - owner
        - created_at
        - updated_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        finding_id:
          type: string
        title:
          type: string
        status:
          type: string
        owner:
          type: string
        due_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
