openapi: 3.1.0
info:
  title: Unified Security Scanner Control Plane API
  version: 1.0.0
  description: |
    Production control plane contract for job submission, worker coordination metadata,
    and finding retrieval.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
  /v1/meta:
    get:
      operationId: getMetadata
      security:
        - BearerToken: []
      responses:
        "200":
          description: Control plane metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceMetadata"
  /v1/auth/me:
    get:
      operationId: getAuthSession
      security:
        - BearerToken: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/auth/tokens:
    get:
      operationId: listApiTokens
      security:
        - BearerToken: []
      responses:
        "200":
          description: Tenant API tokens
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiToken"
    post:
      operationId: createApiToken
      security:
        - BearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenRequest"
      responses:
        "201":
          description: API token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedApiToken"
        "400":
          description: Validation or scope error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/auth/tokens/{tokenId}/disable:
    post:
      operationId: disableApiToken
      security:
        - BearerToken: []
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API token disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiToken"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Protected token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/audit-events:
    get:
      operationId: listAuditEvents
      security:
        - BearerToken: []
      responses:
        "200":
          description: Tenant audit events
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
  /v1/scan-jobs:
    get:
      operationId: listScanJobs
      security:
        - BearerToken: []
      responses:
        "200":
          description: Existing scan jobs
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanJob"
    post:
      operationId: createScanJob
      security:
        - BearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanJobRequest"
      responses:
        "201":
          description: Scan job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/scan-jobs/{jobId}:
    get:
      operationId: getScanJob
      security:
        - BearerToken: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/workers/register:
    post:
      operationId: registerWorker
      parameters:
        - name: X-USS-Worker-Secret
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerRegistrationRequest"
      responses:
        "200":
          description: Worker registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerRegistrationResponse"
  /v1/workers/heartbeat:
    post:
      operationId: recordWorkerHeartbeat
      parameters:
        - name: X-USS-Worker-Secret
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: Worker heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
        "404":
          description: Worker lease not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/findings:
    get:
      operationId: listFindings
      security:
        - BearerToken: []
      responses:
        "200":
          description: Canonical findings
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CanonicalFinding"
components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: API Token
  schemas:
    AuthPrincipal:
      type: object
      additionalProperties: false
      required:
        - user_id
        - organization_id
        - organization_slug
        - organization_name
        - email
        - display_name
        - role
        - auth_provider
      properties:
        user_id:
          type: string
        organization_id:
          type: string
        organization_slug:
          type: string
        organization_name:
          type: string
        email:
          type: string
        display_name:
          type: string
        role:
          type: string
        auth_provider:
          type: string
        scopes:
          type: array
          items:
            type: string
    AuthSession:
      type: object
      additionalProperties: false
      required:
        - principal
        - sso_enabled
        - bootstrap_token
      properties:
        principal:
          $ref: "#/components/schemas/AuthPrincipal"
        sso_enabled:
          type: boolean
        oidc_issuer_url:
          type: string
        oidc_client_id:
          type: string
        bootstrap_token:
          type: boolean
    ApiToken:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - user_id
        - token_name
        - disabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        user_id:
          type: string
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        disabled:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateApiTokenRequest:
      type: object
      additionalProperties: false
      required:
        - token_name
      properties:
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
    CreatedApiToken:
      type: object
      additionalProperties: false
      required:
        - token
        - plaintext_token
      properties:
        token:
          $ref: "#/components/schemas/ApiToken"
        plaintext_token:
          type: string
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - organization_id
        - action
        - resource_type
        - status
        - created_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        actor_user_id:
          type: string
        actor_email:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
        status:
          type: string
        request_method:
          type: string
        request_path:
          type: string
        remote_addr:
          type: string
        details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    CreateScanJobRequest:
      type: object
      additionalProperties: false
      required:
        - target_kind
        - target
        - profile
      properties:
        tenant_id:
          type: string
        target_kind:
          type: string
          enum:
            - repository
            - api
            - domain
            - image
            - cloud_account
        target:
          type: string
        profile:
          type: string
        requested_by:
          type: string
        tools:
          type: array
          items:
            type: string
    ScanJob:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - target_kind
        - target
        - profile
        - requested_by
        - tools
        - approval_mode
        - status
        - requested_at
        - updated_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        target_kind:
          type: string
        target:
          type: string
        profile:
          type: string
        requested_by:
          type: string
        tools:
          type: array
          items:
            type: string
        approval_mode:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
        requested_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ServiceMetadata:
      type: object
      additionalProperties: false
      required:
        - name
        - version
        - scheduler_interval_seconds
        - worker_heartbeat_ttl_seconds
      properties:
        name:
          type: string
        version:
          type: string
        scheduler_interval_seconds:
          type: integer
        worker_heartbeat_ttl_seconds:
          type: integer
    WorkerCapability:
      type: object
      additionalProperties: false
      required:
        - adapter_id
        - supported_target_kinds
        - supported_modes
        - labels
        - linux_preferred
      properties:
        adapter_id:
          type: string
        supported_target_kinds:
          type: array
          items:
            type: string
        supported_modes:
          type: array
          items:
            type: string
        labels:
          type: array
          items:
            type: string
        linux_preferred:
          type: boolean
    WorkerRegistrationRequest:
      type: object
      additionalProperties: false
      required:
        - worker_id
        - worker_version
        - operating_system
        - hostname
        - capabilities
      properties:
        worker_id:
          type: string
        worker_version:
          type: string
        operating_system:
          type: string
        hostname:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/WorkerCapability"
    WorkerRegistrationResponse:
      type: object
      additionalProperties: false
      required:
        - accepted
        - lease_id
        - heartbeat_interval_seconds
      properties:
        accepted:
          type: boolean
        lease_id:
          type: string
        heartbeat_interval_seconds:
          type: integer
    HeartbeatRequest:
      type: object
      additionalProperties: false
      required:
        - worker_id
        - lease_id
      properties:
        worker_id:
          type: string
        lease_id:
          type: string
        timestamp_unix:
          type: integer
        metrics:
          type: object
          additionalProperties:
            type: string
    JobAssignment:
      type: object
      additionalProperties: false
      required:
        - job_id
        - tenant_id
        - adapter_id
        - target_kind
        - target
        - execution_mode
        - approved_modules
        - labels
        - max_runtime_seconds
        - evidence_upload_url
      properties:
        job_id:
          type: string
        tenant_id:
          type: string
        adapter_id:
          type: string
        target_kind:
          type: string
        target:
          type: string
        execution_mode:
          type: string
        approved_modules:
          type: array
          items:
            type: string
        labels:
          type: object
          additionalProperties:
            type: string
        max_runtime_seconds:
          type: integer
        evidence_upload_url:
          type: string
    HeartbeatResponse:
      type: object
      additionalProperties: false
      required:
        - assignments
      properties:
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/JobAssignment"
    CanonicalFinding:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - finding_id
        - tenant_id
        - category
        - title
        - severity
        - confidence
        - status
        - first_seen_at
        - last_seen_at
      properties:
        schema_version:
          type: string
        finding_id:
          type: string
        tenant_id:
          type: string
        category:
          type: string
        title:
          type: string
        severity:
          type: string
        confidence:
          type: string
        status:
          type: string
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
