adapter_id: composer-audit
display_name: Composer Dependency Vulnerability Adapter
execution_modes:
  - passive
requires_human_approval: false
requires_target_scope_match: true
supports_target_kinds:
  - php_repo
  - repo
  - filesystem
default_timeout_seconds: 180
evidence_requirements:
  - json_report
  - dependency_summary
  - advisory_identifiers
