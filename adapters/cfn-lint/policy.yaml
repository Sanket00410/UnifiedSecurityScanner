adapter_id: cfn-lint
display_name: CloudFormation Lint Adapter
execution_modes:
  - passive
requires_human_approval: false
requires_target_scope_match: true
supports_target_kinds:
  - cloudformation
  - repo
  - filesystem
default_timeout_seconds: 180
evidence_requirements:
  - json_report
  - policy_match_summary
  - source_location
