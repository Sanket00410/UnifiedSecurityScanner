adapter_id: gitleaks
display_name: Gitleaks Core Secret Scanner
execution_modes:
  - passive
requires_human_approval: false
supports_target_kinds:
  - repo
  - filesystem
  - go_repo
  - java_repo
  - node_repo
  - dotnet_repo
  - ruby_repo
  - php_repo
  - mobile_repo
  - android_repo
  - ios_repo
default_timeout_seconds: 180
evidence_requirements:
  - json_report
  - source_location
  - detector_context
