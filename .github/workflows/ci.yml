name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  control-plane:
    name: Control Plane Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Test
        run: go test ./...

  worker-runtime:
    name: Worker Runtime Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-runtime/crates/uss-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Check
        run: cargo check

  ui:
    name: UI Typecheck and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
